e at its broadest point. It is joined to the mainland by a causeway called the Stand. This is a narrow road built across the mouth of the river which separates us from the rest of the country. Most of the time, you wouldn't know we're on an island. This is because the river mouth between us and the mainland is just a vast stretch of tall grasses and mud. But when there's a high tide, the water rises a half a metre or so above the road. Nothing can pass until the tide goes out again a few hours later. That is when you know it's an island.\n\nWe were on our way back from the mainland. My older brother, Dominic, had just finished his first year at university in a town 150 km away. Dominic's train was due in at five, and he'd asked for a lift back from the station. Now, Dad normally hates being disturbed when he's writing (which is just about all the time), and he also hates having to go anywhere, but despite the typical sighs and moans, why can't he get a taxi? What's wrong with the bus? – I could tell by the sparkle in his eyes that he was really looking forward to seeing Dominic.\n\nSo, anyway, Dad and I had driven to the mainland and picked up Dominic from the station. He had been talking non-stop from the moment he'd slung his bag in the boot and got in the car. University this, university that, writers, books, parties, people, money, gigs. And when I say talking, I don't mean talking as in having a conversation, I mean talking as in chattering like a crazy person. I didn't like it ... the way he spoke and waved his hands around as if he was some kind of intellectual or something. It was embarrassing. It made me feel uncomfortable – that kind of discomfort you feel when someone you like, someone close to you, suddenly starts acting like a complete idiot. And I didn't like the way he was ignoring me, either. For all the attention I was getting, I might as well not have been there. I felt like a stranger in my own car.\n\nOn that Friday afternoon, we drove toward the island at low tide. The road, known as the Stand, was clear, dry, and looked hazy in the heat. It was a grey concrete path with white railings on each side and rocky banks leading down to the water. Beyond the railings, the water shone with a beautiful silver light, a special sight we sometimes see in the late afternoon and early evening.\n\nWe were about halfway across when I saw the boy. My first thought was how odd it was to see someone walking on the Stand. You don't often see people walking around here. Between Hale and Moulton (the nearest town about thirty kilometres away on the mainland), there's nothing but small cottages, farmland, heathland and a couple of hills. So islanders don't walk because of that. If they're going to Moulton, they tend to take the bus. So the only pedestrians you're likely to see around here are walkers or bird-watchers. But even from a distance, I could tell that the figure ahead didn't fit into either of these categories. I wasn't sure how I knew, I just did.\n\nAs we drew closer, he became clearer. He was actually a young man rather than a boy. Although he was on the small side, he wasn't as slight as I'd first thought. He wasn't exactly muscular, but he didn't look weak either. It's hard to explain. There was a sense of strength about him, a graceful strength that showed in his balance, the way he held himself, the way he walked …", "type": "mc", "prompt": "In the first paragraph, what is Caitlin's main point about the island?", "options": [{"key": "A", "text": "It can be dangerous to try to cross from the mainland."}, {"key": "B", "text": "It is much smaller than it looks from the mainland."}, {"key": "C", "text": "It is only completely cut off at certain times."}, {"key": "D", "text": "It can be a difficult place for people to live in."}], "answer": "C", "answers": ["C"], "points": 1, "note": ""}, {"id": 57, "section": "VII. Read the extract from a novel below. For each question, choose the correct answer. (Questions 56-62)\n e question, because these two factors always work together. Although the traits we inherit may influence our capacity to learn, our surroundings determine the rate of development. Thus, there is some built-in flexibility in the way the brain develops, which helps us adjust to the circumstances that we grow up in.\nE. Besides increasing your memory and comprehension abilities, reading might also encourage readers to take the perspective of and sympathise with different characters. These are important skills for real life, but it seems highly unlikely that they could be acquired or even practised using the kinds of techniques used in ‘brain training’.\nF. Despite the claims, ‘brain training’ is just practising the brain's executive functions by performing complex mental tasks. Although research has shown that this can result in changes in the brain, that is less impressive than it sounds. In fact, everything you do makes small changes in your brain, whether it is doing your homework, meeting friends, or reading this article.\n\nBrain training\nMany of us dream of being smarter, but is it really possible to make our brains work better?\nHave you ever thought about why some of us excel in sports, whereas others are better at playing the guitar or performing mathematical calculations? For many years, scientists have tried to find out which parts of our talents and abilities are determined by our genes and which parts are influenced by the environment.\n(76) _______.\nMany of us look for ways to harness the full potential of our brains, and the internet is full of tips encouraging us to do so. Advice includes sleeping well, eating healthy food, and exercising. But there is also a technique called brain training. After doing just a few minutes of daily brain exercises, users report impressive changes, ranging from improved concentration to getting higher scores on computer games.\n(77) _______.\nWe know that doing everyday tasks like these helps shape your brain, and that <script>
// Dán URL Google Apps Script Web App vào đây để tự động thu bài về Google Sheet.
// Ví dụ: const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/.../exec';
const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxj3eLmfLVoWZgCW2EjlrjDb--aLgw67RYRmbKYb4yoVLPi2q9FjokmMFuUzhPnaIU/exec';
const exam = JSON.parse(document.getElementById('examData').textContent);
let startTime = null;
let submitted = false;
let timerInterval = null;
const answers = {};
const studentName = document.getElementById('studentName');
const studentClass = document.getElementById('studentClass');

function updateStudentInfoBar(){
  const bar=document.getElementById('studentInfoBar');
  const name=studentName.value.trim() || 'Chưa nhập tên';
  const klass=studentClass.value.trim() || 'Chưa nhập lớp';
  bar.innerHTML=`Học sinh: <b>${escapeHtml(name)}</b> &nbsp; | &nbsp; Lớp: <b>${escapeHtml(klass)}</b>`;
}
function showExam(){
  updateStudentInfoBar();
  document.getElementById('studentInfoBar').classList.add('show');
  document.getElementById('exam').classList.remove('hide');
  document.getElementById('writing').classList.remove('hide');
  document.getElementById('tools').classList.remove('hide');
}
function disableExam(){
  document.querySelectorAll('#exam input,#exam select,#writing textarea,#submitBtn,#startBtn').forEach(x=>x.disabled=true);
  document.getElementById('submitBtn').textContent='Đã nộp bài';
}

function normalize(s){return (s||'').toString().normalize('NFKC').trim().toLowerCase().replace(/[.,;:!?]+$/g,'').replace(/\s+/g,' ')}
function el(tag, attrs={}, ...children){const n=document.createElement(tag); for(const [k,v] of Object.entries(attrs)){ if(k==='class') n.className=v; else if(k==='html') n.innerHTML=v; else n.setAttribute(k,v)}; children.flat().forEach(c=>n.append(c instanceof Node?c:document.createTextNode(c))); return n}
function getAnswer(q){ if(q.type==='fill') return document.getElementById('q'+q.id)?.value || ''; if(q.type==='mc') {const r=document.querySelector(`input[name="q${q.id}"]:checked`); return r?r.value:''} if(q.type==='select') return document.getElementById('q'+q.id)?.value || ''; return ''}
function isCorrect(q, val){ if(q.type==='fill'){return (q.answers||[]).map(normalize).includes(normalize(val))} return val === q.answer }
function saveState(){ const state={name:studentName.value, klass:studentClass.value, startTime, submitted, answers:{}, writing:document.getElementById('writingText')?.value||''}; exam.questions.forEach(q=>state.answers[q.id]=getAnswer(q)); localStorage.setItem('nbk_quiz_state_v4', JSON.stringify(state)); updateProgress(); }
function loadState(){ try{const s=JSON.parse(localStorage.getItem('nbk_quiz_state_v4')||'{}'); if(s.name) studentName.value=s.name; if(s.klass) studentClass.value=s.klass; if(s.startTime) startTime=s.startTime; submitted=!!s.submitted; setTimeout(()=>{if(s.answers){for(const q of exam.questions){const val=s.answers[q.id]||''; if(q.type==='fill'||q.type==='select'){const inp=document.getElementById('q'+q.id); if(inp) inp.value=val} else if(q.type==='mc'){const r=document.querySelector(`input[name="q${q.id}"][value="${val}"]`); if(r) r.checked=true}}} if(s.writing){const w=document.getElementById('writingText'); if(w) w.value=s.writing} updateProgress();},0)}catch(e){} }
function render(){ const root=document.getElementById('exam'); let current=''; exam.questions.forEach(q=>{ if(q.section!==current){current=q.section; root.append(el('div',{class:'sectionIntro'},current));} const card=el('div',{class:'q',id:'card'+q.id}); card.append(el('h3',{},'Question '+q.id)); card.append(el('div',{class:'prompt'},q.prompt)); if(q.type==='fill'){ const inp=el('input',{class:'fill',id:'q'+q.id,placeholder:'Type your answer here'}); inp.addEventListener('input',saveState); card.append(inp); } else if(q.type==='mc'){ const opts=el('div',{class:'options'}); q.options.forEach(o=>{ const id='q'+q.id+'_'+o.key; const lab=el('label',{}, el('input',{type:'radio',name:'q'+q.id,value:o.key,id}), `${o.key}. ${o.text}`); lab.querySelector('input').addEventListener('change',saveState); opts.append(lab); }); card.append(opts); } else if(q.type==='select'){ const sel=el('select',{id:'q'+q.id}); sel.append(el('option',{value:''},'-- Choose --')); q.options.forEach(o=>sel.append(el('option',{value:o.key},o.key))); sel.addEventListener('change',saveState); card.append(sel); } card.append(el('div',{class:'answerNote hide',id:'note'+q.id})); root.append(card); });
 const wr=document.getElementById('writing'); wr.append(el('div',{class:'sectionIntro'},exam.writing.prompt)); const textarea=el('textarea',{id:'writingText',placeholder:'Write your email here...'}); textarea.addEventListener('input',saveState); wr.append(el('div',{class:'q'},el('h3',{},'Writing'),textarea,el('div',{class:'small'},'Phần Writing không tự chấm điểm. GV đọc và chấm riêng.'))); }
function updateProgress(){ let done=0; exam.questions.forEach(q=>{ if(getAnswer(q)) done++; }); const total=exam.questions.length; document.getElementById('answeredCount').textContent=`Đã làm ${done}/${total} câu`; document.getElementById('bar').style.width=(done/total*100)+'%'; }
function startTimer(){
  if(submitted){ alert('Bài đã được nộp trên thiết bị này. Không thể làm lại.'); return; }
  if(!studentName.value.trim() || !studentClass.value.trim()){ alert('Vui lòng nhập họ tên và lớp trước khi bắt đầu.'); return; }
  showExam();
  document.getElementById('startPanel').classList.add('hide');
  if(!startTime) startTime=Date.now();
  clearInterval(timerInterval);
  const tick=()=>{
    const elapsed=Math.floor((Date.now()-startTime)/1000);
    const remain=Math.max(0, exam.timeLimitMinutes*60-elapsed);
    const m=Math.floor(remain/60), s=remain%60;
    document.getElementById('timer').textContent=`Thời gian: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(remain<=0 && !submitted){ clearInterval(timerInterval); alert('Hết giờ! Bài sẽ được chấm và khóa.'); grade(); }
  };
  tick();
  timerInterval=setInterval(tick,1000);
  saveState();
}
function grade(){
  if(submitted){ alert('Bài đã nộp rồi. Không thể nộp lại.'); return; }
  submitted=true;
  localStorage.setItem('nbk_quiz_submitted_v4','true');
  saveState();
  let score=0;
  exam.questions.forEach(q=>{
    const val=getAnswer(q); const ok=isCorrect(q,val); if(ok) score+=q.points;
    const card=document.getElementById('card'+q.id); card.classList.remove('correct','wrong'); card.classList.add(ok?'correct':'wrong');
    const note=document.getElementById('note'+q.id); note.className='answerNote '+(ok?'good':'bad');
    note.textContent=ok?'Đúng':'Chưa đúng';
    note.classList.remove('hide');
  });
  const percent=Math.round(score/exam.totalPoints*100);
  document.getElementById('result').innerHTML=`<div class="resultBox"><h2>Kết quả: ${score}/${exam.totalPoints} điểm (${percent}%)</h2><p><b>Học sinh:</b> ${escapeHtml(studentName.value||'Chưa nhập tên')} &nbsp; <b>Lớp:</b> ${escapeHtml(studentClass.value||'')}</p><p>Writing không tính vào điểm tự động. GV chấm riêng.</p><p id="submitStatus">Đang gửi bài về hệ thống thu bài...</p><button class="btn secondary" onclick="window.print()">In / lưu PDF kết quả</button></div>`;
  disableExam();
  sendToGoogleSheet();
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function csvEscape(s){return '"'+(s||'').toString().replace(/"/g,'""')+'"'}
function resultObject(){
  let score=0;
  const now=new Date();
  const durationSeconds=startTime?Math.floor((Date.now()-startTime)/1000):0;
  const row={date:now.toLocaleString(), submitTime:now.toISOString(), startTime:startTime?new Date(startTime).toISOString():'', durationSeconds, name:studentName.value||'', class:studentClass.value||''};
  exam.questions.forEach(q=>{ const val=getAnswer(q); if(isCorrect(q,val)) score+=q.points; row['Q'+q.id]=val; });
  row.score=score+'/'+exam.totalPoints;
  row.scoreNumber=score;
  row.totalPoints=exam.totalPoints;
  row.percent=Math.round(score/exam.totalPoints*100);
  row.writing=document.getElementById('writingText')?.value||'';
  return row;
}
function sendToGoogleSheet(){
  const status=document.getElementById('submitStatus');
  if(!GOOGLE_APPS_SCRIPT_URL){
    if(status) status.textContent='Chưa cài URL Google Sheet nên bài chỉ lưu trên máy này. GV có thể dùng nút tải CSV/TXT.';
    return;
  }
  fetch(GOOGLE_APPS_SCRIPT_URL, {
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(resultObject())
  }).then(()=>{ if(status) status.textContent='Đã gửi bài. GV kiểm tra Google Sheet để xem kết quả.'; })
    .catch(()=>{ if(status) status.textContent='Không gửi được về Google Sheet. Hãy tải CSV/TXT và gửi cho GV.'; });
}

function download(filename, content, type='text/plain;charset=utf-8'){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=filename; a.click(); URL.revokeObjectURL(a.href); }
function downloadCSV(){ const r=resultObject(); const keys=['date','name','class','score',...exam.questions.map(q=>'Q'+q.id),'writing']; const csv=keys.join(',')+'\n'+keys.map(k=>csvEscape(r[k]||'')).join(','); const safe=(studentName.value||'student').replace(/[^a-zA-Z0-9_-]+/g,'_'); download(`ket_qua_NBK_${safe}.csv`, csv, 'text/csv;charset=utf-8'); }
function downloadTXT(){ const r=resultObject(); let txt=`NBK Entrance Test - Bài làm\nHọ tên: ${r.name}\nLớp: ${r.class}\nThời gian nộp: ${r.date}\nĐiểm tự động: ${r.score}\n\n`; exam.questions.forEach(q=>{txt+=`Question ${q.id}: ${r['Q'+q.id]||''}\n`}); txt+=`\nWRITING:\n${r.writing}\n`; const safe=(studentName.value||'student').replace(/[^a-zA-Z0-9_-]+/g,'_'); download(`bai_lam_NBK_${safe}.txt`, txt); }
render(); loadState(); updateProgress();
if(localStorage.getItem('nbk_quiz_submitted_v4')==='true' || submitted){ submitted=true; showExam(); document.getElementById('startPanel').classList.add('hide'); disableExam(); document.getElementById('result').innerHTML='<div class="resultBox"><h2>Bài đã được nộp trên thiết bị này</h2><p>Không thể làm lại. Thông tin học sinh vẫn được hiển thị ở thanh màu vàng phía trên.</p></div>'; }
else if(startTime){ showExam(); document.getElementById('startPanel').classList.add('hide'); startTimer(); }
document.getElementById('startBtn').onclick=()=>startTimer();
studentName.addEventListener('input',()=>{updateStudentInfoBar(); saveState();});
studentClass.addEventListener('input',()=>{updateStudentInfoBar(); saveState();});
document.getElementById('submitBtn').onclick=()=>{ if(confirm('Bạn chắc chắn muốn nộp bài? Sau khi nộp sẽ không thể làm lại trên thiết bị này.')) grade(); };
document.getElementById('saveBtn').onclick=downloadCSV;
document.getElementById('txtBtn').onclick=downloadTXT;
window.addEventListener('beforeunload',saveState);
</script>
</body>
